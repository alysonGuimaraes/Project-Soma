sonar.projectKey=alysonGuimaraes_Project-Soma
sonar.organization=alysonguimaraes

sonar.projectName=Soma
sonar.projectVersion=1.0

# Caminhos de Código
sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Exclusões de Análise (Onde a "mágica" acontece)
# Ignora arquivos gerados (.g.dart, .freezed.dart), pastas de build e dependências
sonar.exclusions=**/*.g.dart, **/*.freezed.dart, lib/generated_plugin_registrant.dart, build/**, .dart_tool/**, test/**

# Configuração de Cobertura de Testes (LCOV)
sonar.dart.lcov.reportPath=coverage/lcov.info
